name: Feature Request
description: Suggest an idea for the Kimi plugin for Claude Code
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow pain point or gap you ran into.
      placeholder: When I delegate long tasks to Kimi I can't ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like the plugin to do, and how it might work (commands, flags, output).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered, including workarounds you use today.
